name: Daily AI Knowledge Update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      # ------------------------------------------------
      # 1️⃣ AI News (Hacker News API)
      # ------------------------------------------------

      - name: Fetch AI News
        run: |
          echo "# 🧠 Daily AI News" > ai-news.md
          echo "" >> ai-news.md
          echo "Updated: $(date)" >> ai-news.md
          echo "" >> ai-news.md

          curl -s "https://hn.algolia.com/api/v1/search?query=AI&tags=story&hitsPerPage=10" \
          | jq -r '.hits[] | select(.url != null) | "- [" + .title + "](" + .url + ")"' \
          >> ai-news.md

      # ------------------------------------------------
      # 2️⃣ Trending GitHub Repos
      # ------------------------------------------------

      - name: Fetch Trending Repos
        run: |
          echo "# 🚀 Trending GitHub Repositories" > trending-repos.md
          echo "" >> trending-repos.md
          echo "Updated: $(date)" >> trending-repos.md
          echo "" >> trending-repos.md

          curl -s "https://api.github.com/search/repositories?q=machine+learning&sort=stars&order=desc&per_page=10" \
          | jq -r '.items[] | "- [" + .full_name + "](" + .html_url + ") ⭐ " + (.stargazers_count|tostring)' \
          >> trending-repos.md

      # ------------------------------------------------
      # 3️⃣ AI Learning Topic (Wikipedia)
      # ------------------------------------------------

      - name: Fetch AI Learning Topic
        run: |
          echo "# 📚 AI Learning Notes" > ai-learning.md
          echo "" >> ai-learning.md
          echo "Updated: $(date)" >> ai-learning.md
          echo "" >> ai-learning.md

          RESPONSE=$(curl -s https://en.wikipedia.org/api/rest_v1/page/random/summary)

          if echo "$RESPONSE" | jq . >/dev/null 2>&1; then
            echo "$RESPONSE" | jq -r '"## " + .title + "\n\n" + .extract + "\n\nSource: " + .content_urls.desktop.page' >> ai-learning.md
          else
            echo "Could not fetch AI topic today. Wikipedia API returned unexpected response." >> ai-learning.md
          fi

      # ------------------------------------------------
      # Commit changes
      # ------------------------------------------------

      - name: Commit updates
        run: |
          git config --global user.name "Rajib Roy"
          git config --global user.email "bboyrajib@users.noreply.github.com"
          git add ai-news.md trending-repos.md ai-learning.md
          git commit -m "automation: update AI news, repos, and learning notes" || echo "No changes"
          git push
