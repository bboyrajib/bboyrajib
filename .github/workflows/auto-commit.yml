name: Daily Activity Commit

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update activity file
        run: |
          echo "Activity update: $(date)" >> activity.log

      - name: Commit changes
        run: |
          git config --global user.name "bboyrajib"
          git config --global user.email "bboyrajib@users.noreply.github.com"
          git add activity.log
          git commit -m "chore: daily activity update" || echo "No changes"

      - name: Push changes
        run: |
          git push
